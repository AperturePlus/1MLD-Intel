name: Frontend CI

on:
  pull_request:
    paths:
      - 'Front-Webpage/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'Front-Webpage/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  web-frontend:
    name: Build Front-Webpage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Front-Webpage/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: front-webpage-dist
          path: Front-Webpage/frontend/dist
