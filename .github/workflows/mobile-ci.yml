name: Mobile CI

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

jobs:
  mobile-typecheck:
    name: Type Check Mobile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run ci:check
