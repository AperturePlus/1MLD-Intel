spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/imld_core?sslmode=disable&characterEncoding=utf8
    username: imld_user
    password: system
  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20
    template:
      mandatory: true

imld:
  deployment:
    mode: saas
    tenant-mode: multi-tenant
  cloud-bridge:
    enabled: false
  licensing:
    private-edition:
      startup-validation-enabled: false
      machine-binding-enabled: false
  upgrade:
    check-enabled: false
